<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker || main|page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- google font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind and daisy ui cdn -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- link css -->
      <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-200 ">
  <!-- header section -->
    <header >
    <nav>
    <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1 px-6">
    <span class="flex gap-2 items-center"><img class="logo  w-[50px] h-[50px]" src="./assets/github-logo.png" alt=""> <h3 class="font-bold text-2xl">GitHub Issues Tracker</h3> </span>
  </div>
  <div class="flex gap-1 ">
    <label class="input w-64">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search Issues ..." />
</label>
    <div class="dropdown dropdown-end">
        <div class="w-50">
          <button class="btn btn-primary">+ New Issues</button>
        </div>
      </div>
    </div>
  </div>
  </div>
    </nav>
    </header>

    <!-- filter all/open/close tab section  -->
     <section>
      <div class="mt-8 mb-5 bg-white h-[80px] px-7 w-10/12 flex gap-3 mx-auto py-6 rounded-lg">
        <button class="btn btn-soft btn-primary w-[100px] text-gray-600  py-5">All</button>
        <button class="btn btn-soft btn-primary w-[100px] text-gray-600 py-5">Open</button>
        <button class="btn btn-soft btn-primary w-[100px] text-gray-600 py-5">Close</button>
      </div>
     </section>
    
</body>
</html>
